<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Luxor: True Golden Artifacts</title>
    <script src="https://cdn.jsdelivr.net/npm/progressbar.js@1.1.0/dist/progressbar.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Philosopher&display=swap');

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background: #000;
            font-family: 'Philosopher', sans-serif;
            cursor: none;
        }

        .tomb {
            position: relative;
            width: 100vw; height: 100vh;
            background: url('2.png') center/cover no-repeat;
            background-color: #050505;
        }

        #darkness {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle 220px at 50% 50%, transparent 10%, rgba(0,0,0,0.98) 100%);
            pointer-events: none; z-index: 200;
        }

        #scarab-cursor {
            position: fixed;
            width: 85px; height: 85px;
            background: url('1.png') center/contain no-repeat;
            pointer-events: none;
            z-index: 1000;
            filter: drop-shadow(0 0 15px rgba(255, 215, 0, 0.7));
            transform: translate(-50%, -50%);
        }

        .glyph {
            position: absolute;
            width: 80px; height: 80px;
            z-index: 300;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            opacity: 0;
            filter: sepia(0.8) brightness(0.7) contrast(1.2) drop-shadow(0 0 5px rgba(184, 134, 11, 0.5));
            transition: opacity 0.4s, filter 0.4s, transform 0.3s;
        }

        .glyph.charging {
            opacity: 1 !important;
            filter: sepia(0) brightness(1.2) contrast(1.5) drop-shadow(0 0 15px #ffd700) drop-shadow(0 0 30px #b8860b);
            transform: scale(1.15);
        }

        .progress-container {
            position: absolute; width: 110px; height: 110px;
            top: -15px; left: -15px; pointer-events: none;
        }

        .ui-top {
            position: absolute; top: 20px; width: 100%;
            display: flex; flex-direction: column; align-items: center; z-index: 500;
        }

        .artifact-slots { display: flex; gap: 8px; margin-bottom: 10px; }
        .slot { 
            width: 50px; height: 50px; border: 2px solid #d4af37; 
            background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center;
            border-radius: 5px; box-shadow: inset 0 0 10px rgba(212, 175, 55, 0.5);
        }

        .volume-box {
            display: flex; align-items: center; gap: 10px; margin-top: 5px;
            background: rgba(0,0,0,0.6); padding: 4px 12px; border-radius: 15px; border: 1px solid #d4af37;
        }
        #volume-slider { width: 70px; cursor: pointer; accent-color: #ffd700; }

        .lives-container { display: flex; gap: 12px; margin-top: 10px; }
        .life-icon {
            width: 22px; height: 22px;
            background: linear-gradient(45deg, #ffd700, #b8860b);
            clip-path: polygon(50% 0%, 100% 35%, 80% 100%, 50% 80%, 20% 100%, 0% 35%);
            box-shadow: 0 0 8px #ffd700;
        }
        .life-lost { background: #333 !important; box-shadow: none !important; opacity: 0.4; }

        .tablet, .victory-screen, .game-over {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 380px; background: radial-gradient(circle, #2c1f01 0%, #000 100%);
            border: 2px solid #ffd700; padding: 30px; text-align: center;
            z-index: 2000; display: none; color: #ffd700;
            box-shadow: 0 0 50px rgba(0,0,0,0.9);
        }

        .choice-btn {
            display: block; width: 100%; padding: 15px; margin: 12px 0;
            background: rgba(0,0,0,0.7); border: 1px solid #ffd700; color: #ffd700; 
            cursor: pointer; font-family: 'Cinzel Decorative'; transition: 0.3s;
        }
        .choice-btn:hover { background: #ffd700; color: #000; }

        .slot .glyph {
            position: relative !important; top: 0 !important; left: 0 !important;
            opacity: 1 !important; transform: scale(0.65) !important;
        }

        .flying {
            transition: all 0.8s cubic-bezier(0.19, 1, 0.22, 1);
            z-index: 2500 !important;
            filter: brightness(1.5) drop-shadow(0 0 20px #ffd700) !important;
        }

        @keyframes shockAnim { 
            0% { background: rgba(255, 255, 255, 0.8); }
            100% { background: transparent; }
        }
        .shock-flash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 3000; pointer-events: none; animation: shockAnim 0.4s ease-out forwards;
        }
    </style>
</head>
<body>

<div id="scarab-cursor"></div>
<div id="flash-effect"></div>

<div class="tomb" id="main-stage">
    <div id="darkness"></div>
    
    <div class="ui-top">
        <div class="artifact-slots" id="slots-container"></div>
        
        <div class="volume-box">
            <span style="color:#ffd700; font-size:9px; font-family:'Cinzel Decorative';">VOL</span>
            <input type="range" id="volume-slider" min="0" max="1" step="0.1" value="0.5">
        </div>

        <div class="lives-container" id="lives-box">
            <div class="life-icon"></div>
            <div class="life-icon"></div>
            <div class="life-icon"></div>
        </div>
    </div>

    <div id="glyphs-layer"></div>

    <div class="tablet" id="tablet">
        <h2 id="q-word" style="font-size: 20px; line-height: 1.4;">ARTIFACT</h2>
        <button class="choice-btn" onclick="handleAnswer('True')">True</button>
        <button class="choice-btn" onclick="handleAnswer('False')">False</button>
    </div>

    <div class="victory-screen" id="victory-box">
        <h1 style="font-family:'Cinzel Decorative';">ARTIFACTS COLLECTED!</h1>
        <p>The path is now open.</p>
        <button class="choice-btn" onclick="location.reload()">RESTART</button>
    </div>

    <div class="game-over" id="fail-box">
        <h1 style="font-family:'Cinzel Decorative'; color: #ff3300;">CURSED!</h1>
        <p>Your energy has faded...</p>
        <button class="choice-btn" onclick="location.reload()">TRY AGAIN</button>
    </div>
</div>

<script>
    const glyphImages = ['3.png', '4.png', '5.png', '6.png', '7.png', '8.png', '9.png', '10.png', '11.png', '12.png'];
    let questions = [
        { w: "The Sun God Ra traveled in a golden boat.", a: "True" },
        { w: "Khepri is the evening form of the Sun God.", a: "False" },
        { w: "The Pyramids were built only as tombs.", a: "False" },
        { w: "The Ankh symbol represents eternal life.", a: "True" },
        { w: "The Djed Pillar is a symbol of strength.", a: "True" },
        { w: "Apophis, the Serpent, loved the light.", a: "False" },
        { w: "The Lotus Flower symbolizes rebirth.", a: "True" },
        { w: "Khepri rolled the Sun like a ball of light.", a: "True" },
        { w: "If Apophis wins, the Sun will rise again.", a: "False" },
        { w: "The Papyrus scrolls contain magic spells.", a: "True" }
    ];

    let collectedCount = 0;
    let lives = 3;
    let bar = null;
    let currentTarget = null;
    let activeGlyphForQuestion = null;

    const scarab = document.getElementById('scarab-cursor');
    const darkness = document.getElementById('darkness');
    const tablet = document.getElementById('tablet');
    const livesIcons = document.querySelectorAll('.life-icon');

    function playSnd(file) {
        const audio = new Audio(file);
        audio.volume = document.getElementById('volume-slider').value;
        audio.play().catch(e => {});
    }

    // Инициализация СРАЗУ
    function initGame() {
        initSlots();
        initGlyphs();
        document.body.style.cursor = 'none';
    }

    function initSlots() {
        const container = document.getElementById('slots-container');
        container.innerHTML = '';
        for(let i=0; i<10; i++) {
            let slot = document.createElement('div');
            slot.className = 'slot';
            slot.id = 'slot-' + i;
            container.appendChild(slot);
        }
    }

function initGlyphs() {
        const layer = document.getElementById('glyphs-layer');
        if (!layer) return;
        layer.innerHTML = '';
        
        // Берем актуальные размеры экрана на момент вызова
        const w = window.innerWidth;
        const h = window.innerHeight;

        const cols = 5; 
        const rows = 2;
        const marginTop = 250; // Увеличил отступ, чтобы не перекрывать UI сверху
        const marginBottom = 100;
        const marginSide = 100;
        
        const cellWidth = (w - (marginSide * 2)) / cols;
        const cellHeight = (h - marginTop - marginBottom) / rows;

        // Перемешиваем вопросы и картинки
        const shuffledQ = [...questions].sort(() => Math.random() - 0.5);
        const shuffledImg = [...glyphImages].sort(() => Math.random() - 0.5);

        shuffledQ.forEach((q, index) => {
            const g = document.createElement('div');
            g.className = 'glyph';
            g.id = 'glyph-' + index;
            g.setAttribute('data-q', q.w);
            g.setAttribute('data-a', q.a);
            g.style.backgroundImage = `url('${shuffledImg[index]}')`;
            
            const col = index % cols;
            const row = Math.floor(index / cols);
            
            // Центр ячейки + небольшой случайный разброс
            const baseX = marginSide + (col * cellWidth) + (cellWidth / 2);
            const baseY = marginTop + (row * cellHeight) + (cellHeight / 2);
            
            const jitterX = (Math.random() - 0.5) * (cellWidth * 0.4);
            const jitterY = (Math.random() - 0.5) * (cellHeight * 0.4);
            
            // Финальная позиция (вычитаем 40, так как размер глифа 80x80)
            const finalX = Math.floor(baseX + jitterX - 40);
            const finalY = Math.floor(baseY + jitterY - 40);

            g.style.left = finalX + 'px';
            g.style.top = finalY + 'px';
            
            const pCont = document.createElement('div');
            pCont.className = 'progress-container';
            g.appendChild(pCont);
            layer.appendChild(g);
        });
    }

    // Вместо window.onload используем небольшой таймаут, 
    // чтобы Genially успел отрисовать контейнер
    window.addEventListener('load', () => {
        setTimeout(initGame, 100); 
    });

    window.addEventListener('mousemove', (e) => {
        const x = e.clientX; const y = e.clientY;
        scarab.style.left = x + 'px';
        scarab.style.top = y + 'px';
        darkness.style.background = `radial-gradient(circle 220px at ${x}px ${y}px, transparent 10%, rgba(0,0,0,0.98) 100%)`;

        if(tablet.style.display === 'block' || lives <= 0) return;

        const allGlyphs = document.querySelectorAll('.glyph:not(.collected)');
        let foundAny = false;

        allGlyphs.forEach(g => {
            const rect = g.getBoundingClientRect();
            const dist = Math.hypot(x - (rect.left + 40), y - (rect.top + 40));

            if(dist < 180) {
                g.style.opacity = Math.max(parseFloat(g.style.opacity || 0), 1 - (dist / 180));
                if(dist < 45) {
                    foundAny = true;
                    if(currentTarget !== g) startNewCharging(g);
                }
            } else if (g !== currentTarget) {
                g.style.opacity = "0";
            }
        });
        if(!foundAny) stopCharging();
    });

    function startNewCharging(g) {
        stopCharging();
        currentTarget = g;
        g.classList.add('charging');
        playSnd('1.mp3'); 

        bar = new ProgressBar.Circle(g.querySelector('.progress-container'), {
            strokeWidth: 7, easing: 'easeInOut', duration: 2500, color: '#ffd700',
            trailColor: 'rgba(255,215,0,0.1)', trailWidth: 1
        });
        bar.animate(1.0, () => {
            if(currentTarget === g) {
                activeGlyphForQuestion = currentTarget;
                showQuestion();
                stopCharging();
            }
        });
    }

    function stopCharging() {
        if(currentTarget) currentTarget.classList.remove('charging');
        if(bar) { bar.destroy(); bar = null; }
        currentTarget = null;
    }

    function showQuestion() {
        document.getElementById('q-word').innerText = activeGlyphForQuestion.getAttribute('data-q');
        tablet.setAttribute('data-correct', activeGlyphForQuestion.getAttribute('data-a'));
        tablet.style.display = 'block';
        document.body.style.cursor = 'default';
        playSnd('2.mp3');
    }

    window.handleAnswer = (ans) => {
        if(ans === tablet.getAttribute('data-correct')) {
            tablet.style.display = 'none';
            document.body.style.cursor = 'none';
            playSnd('3.mp3');
            animateToSlot();
        } else {
            processError();
        }
    };

    function processError() {
        lives--;
        playSnd('5.mp3');
        if(lives >= 0) livesIcons[lives].classList.add('life-lost');
        
        const flash = document.getElementById('flash-effect');
        flash.classList.add('shock-flash');
        setTimeout(() => flash.classList.remove('shock-flash'), 400);

        tablet.style.display = 'none';
        document.body.style.cursor = 'none';
        
        scarab.style.transition = "transform 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28)";
        scarab.style.transform = "translate(-50%, -50%) scale(2)";
        setTimeout(() => {
            scarab.style.transition = "none";
            scarab.style.transform = "translate(-50%, -50%) scale(1)";
        }, 500);
        
        if(lives <= 0) {
            document.getElementById('fail-box').style.display = 'block';
            document.body.style.cursor = 'default';
        }
    }

    function animateToSlot() {
        if(!activeGlyphForQuestion) return;
        const slot = document.getElementById('slot-' + collectedCount);
        const slotRect = slot.getBoundingClientRect();
        activeGlyphForQuestion.classList.add('collected', 'flying');
        activeGlyphForQuestion.style.left = slotRect.left + 'px';
        activeGlyphForQuestion.style.top = slotRect.top + 'px';

        setTimeout(() => {
            activeGlyphForQuestion.classList.remove('flying');
            slot.appendChild(activeGlyphForQuestion);
            collectedCount++;
            if(collectedCount >= 10) {
                playSnd('4.mp3');
                document.getElementById('victory-box').style.display = 'block';
                document.body.style.cursor = 'default';
            }
        }, 900);
    }

    // Запуск игры при загрузке окна
    window.onload = initGame;
</script>
</body>
</html>
